<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - Sistema Hospitalar</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <header class="glass-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 1.25rem;">Segurança da Conta</h2>
            <button id="logout-btn" class="btn btn-sm btn-danger">Sair</button>
        </div>
    </header>

    <div class="center-wrapper fade-in" style="min-height: calc(100vh - 70px);">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h2>Alterar Senha</h2>
                <p>Atualize sua senha de acesso regularmente</p>
            </div>
            <form id="change-password-form">
                <div class="form-group">
                    <label for="old-password">Senha Atual</label>
                    <input type="password" id="old-password" class="form-control" required placeholder="Digite sua senha atual">
                </div>
                <div class="form-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" class="form-control" required minlength="6" placeholder="Mínimo de 6 caracteres">
                </div>
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Atualizar Senha</button>
            </form>
            <div class="text-center" style="margin-top: 1.5rem;">
                <a href="#" id="back-to-dashboard" style="font-size: 0.9rem;">&larr; Voltar para o Dashboard</a>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script type="module" src="./dist/index.js"></script>
    <script>
        document.getElementById('back-to-dashboard').addEventListener('click', (e) => {
            e.preventDefault();
            const role = localStorage.getItem('user_role');
            if(role === 'ADMIN') window.location.href = 'admin-dashboard.html';
            else window.location.href = 'medical-dashboard.html';
        });
    </script>
</body>
</html>
