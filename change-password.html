<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card shadow">
            <div class="login-header">
                <h2>Trocar Senha</h2>
                <p>Defina uma nova senha para sua conta</p>
            </div>
            <form id="change-password-form">
                <div class="form-group">
                    <label for="old_password">Senha atual</label>
                    <input type="password" id="old_password" name="old_password" required placeholder="Digite sua senha atual">
                </div>
                <div class="form-group">
                    <label for="new_password">Nova senha</label>
                    <input type="password" id="new_password" name="new_password" required placeholder="Mínimo 8 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar nova senha</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repita a nova senha">
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary w-100">Salvar nova senha</button>
            </form>
            <div class="login-links">
                <a id="back-link" href="#">← Voltar ao painel</a>
            </div>
        </div>
    </div>
    <script type="module" src="./dist/change-password.js"></script>
</body>
</html>
