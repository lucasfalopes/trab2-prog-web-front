<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troca Obrigatória de Senha - Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card shadow">
            <div class="login-header">
                <h2>Troca de Senha Necessária</h2>
                <p>Por motivos de segurança, você deve definir uma nova senha antes de continuar.</p>
            </div>
            <form id="force-change-password-form">
                <div class="form-group">
                    <label for="old_password">Senha Temporária</label>
                    <input type="password" id="old_password" name="old_password" required placeholder="Digite a senha temporária">
                </div>
                <div class="form-group">
                    <label for="new_password">Nova Senha</label>
                    <input type="password" id="new_password" name="new_password" required placeholder="Digite sua nova senha">
                </div>
                <button type="submit" class="btn btn-primary w-100">Atualizar Senha</button>
            </form>
        </div>
    </div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
