<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ação Necessária - Sistema Hospitalar</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div id="app" class="fade-in">
        <div class="center-wrapper">
            <div class="glass-panel auth-card">
                <div class="auth-header">
                    <h2 style="color: var(--warning);">Senha Temporária</h2>
                    <p>Detectamos que você está usando uma senha de reset. Por motivos de segurança, altere-a agora.</p>
                </div>
                <form id="force-change-password-form">
                    <div class="form-group">
                        <label for="old_password">Senha Temporária (Atual)</label>
                        <input type="password" id="old_password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="new_password">Defina sua Nova Senha Segura</label>
                        <input type="password" id="new_password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-warning w-100" style="margin-top: 1rem; color: #000; font-weight: bold; background: var(--warning);">Atualizar e Entrar</button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
