<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha - Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card shadow">
            <div class="login-header">
                <h2>Recuperar Senha</h2>
                <p>Informe seu e-mail para receber as instruções</p>
            </div>
            <form id="forgot-password-form">
                <div class="form-group">
                    <label for="email">E-mail Cadastrado</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar código de recuperação</button>
            </form>
            <div class="login-links">
                <a href="index.html">Voltar para o Login</a>
            </div>
        </div>
    </div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
