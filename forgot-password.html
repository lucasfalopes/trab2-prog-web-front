<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha - Sistema Hospitalar</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div id="app" class="fade-in">
        <div class="center-wrapper">
            <div class="glass-panel auth-card">
                <div class="auth-header">
                    <h2>Recuperar Senha</h2>
                    <p>Informe seu e-mail para solicitar o reset</p>
                </div>
                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="email">E-mail Cadastrado</label>
                        <input type="email" id="email" class="form-control" required placeholder="exemplo@hospital.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Solicitar Redefinição</button>
                </form>
                <div class="text-center" style="margin-top: 1.5rem;">
                    <a href="index.html" style="font-size: 0.9rem;">&larr; Voltar para o Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
