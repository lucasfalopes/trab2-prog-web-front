<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Dispositivos Hospitalares - Login</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div id="app" class="fade-in">
        <div class="center-wrapper">
            <div class="glass-panel auth-card">
                <div class="auth-header">
                    <h2>Portal Hospitalar</h2>
                    <p>Acesso Restrito ao Sistema</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" class="form-control" required placeholder="Digite seu usuário">
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" class="form-control" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Entrar no Sistema</button>
                </form>
                <div class="text-center" style="margin-top: 1.5rem;">
                    <a href="forgot-password.html" style="font-size: 0.9rem;">Esqueceu sua senha? Solicite recuperação</a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
