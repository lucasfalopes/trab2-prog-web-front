<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Dispositivos Hospitalares</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card shadow">
                <div class="login-header">
                    <h2>Sistema Hospitalar</h2>
                    <p>Acesso Restrito</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar no Sistema</button>
                </form>
                <div class="login-links">
                    <a href="forgot-password.html">Esqueci minha senha</a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
