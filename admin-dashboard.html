<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
    <style>
        .dashboard-header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 1rem 0;
        }
        .dashboard-header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-content {
            padding: 2rem 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="container">
            <h2>Painel Administrador</h2>
            <button id="logout-btn" class="btn btn-sm" style="background: transparent; border: 1px solid white; color: white;">Sair</button>
        </div>
    </header>
    <main class="container dashboard-content">
        <h3>Solicitações de Reset de Senha</h3>
        <table class="shadow" style="border-radius: var(--border-radius); overflow: hidden;">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="reset-requests-tbody">
                <!-- Linhas preenchidas via TS -->
            </tbody>
        </table>
        
        <h3 style="margin-top: 3rem;">Gestão de Dispositivos</h3>
        <button id="add-device-btn" class="btn btn-primary" style="margin-bottom: 1rem;">Adicionar Dispositivo</button>
        <table class="shadow" style="border-radius: var(--border-radius); overflow: hidden;">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Localização</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="admin-devices-tbody">
                <!-- Preenchido via TS na próxima tarefa -->
                <tr><td colspan="5" style="text-align: center;">Carregando dispositivos...</td></tr>
            </tbody>
        </table>
    </main>
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="login-card shadow" style="width:100%; max-width:480px; margin:1rem;">
            <h3 style="margin-bottom:1.5rem;">Editar Dispositivo</h3>
            <form id="edit-device-form">
                <input type="hidden" id="edit-device-id">
                <div class="form-group">
                    <label for="edit-name">Nome</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-type">Tipo</label>
                    <input type="text" id="edit-type" required>
                </div>
                <div class="form-group">
                    <label for="edit-status">Status</label>
                    <select id="edit-status">
                        <option value="Disponível">Disponível</option>
                        <option value="Em uso">Em uso</option>
                        <option value="Manutenção">Manutenção</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-location">Localização</label>
                    <input type="text" id="edit-location" required>
                </div>
                <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Salvar</button>
                    <button type="button" id="edit-cancel-btn" class="btn" style="flex:1; background:#6c757d; color:white;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
