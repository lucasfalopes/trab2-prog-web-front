<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/global.css">
    <style>
        .dashboard-header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 1rem 0;
        }
        .dashboard-header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-content {
            padding: 2rem 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="container">
            <h2>Painel Administrador</h2>
            <button id="logout-btn" class="btn btn-sm" style="background: transparent; border: 1px solid white; color: white;">Sair</button>
        </div>
    </header>
    <main class="container dashboard-content">
        <h3>Solicitações de Reset de Senha</h3>
        <table class="shadow" style="border-radius: var(--border-radius); overflow: hidden;">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="reset-requests-tbody">
                <!-- Linhas preenchidas via TS -->
            </tbody>
        </table>
    </main>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
