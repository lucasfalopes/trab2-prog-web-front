<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Médico - Sistema Hospitalar</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <header class="glass-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 1.25rem;">Portal Clínico</h2>
            <div>
                <a href="change-password.html" class="btn btn-sm" style="color: var(--text-main); margin-right: 15px;">Alterar Senha</a>
                <button id="logout-btn" class="btn btn-sm btn-danger">Sair da Conta</button>
            </div>
        </div>
    </header>

    <main class="container fade-in" style="padding-top: 2rem;">
        <h3 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Inventário Hospitalar</h3>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Acompanhamento em tempo real dos ativos da sua ala.</p>
        
        <div class="tabs">
            <button id="tab-devices" class="tab-btn active">Dispositivos Médicos</button>
            <button id="tab-utensils" class="tab-btn">Utensílios Gerais</button>
        </div>

        <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;">
            <label for="status-filter" style="font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Filtrar por status:</label>
            <select id="status-filter" class="form-control" style="width: 200px;">
                <option value="">Todos</option>
                <option value="Disponível">Disponível</option>
                <option value="Em uso">Em uso</option>
                <option value="Manutenção">Manutenção</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nome do Ativo</th>
                        <th>Tipo / Categoria</th>
                        <th id="th-status-qty">Status Operacional</th>
                        <th>Localização</th>
                    </tr>
                </thead>
                <tbody id="devices-tbody">
                    <!-- Linhas preenchidas via JavaScript -->
                    <tr><td colspan="4" class="text-center">Carregando dados do servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
    
    <div id="toast-container"></div>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
